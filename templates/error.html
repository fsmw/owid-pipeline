{% extends "base.html" %}

{% block title %}Error - OWID Cleaner{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center">
    <div class="bg-white rounded-lg shadow-md p-8">
        <svg class="w-20 h-20 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Oops! Something went wrong</h1>
        
        <p class="text-gray-600 mb-6">
            {{ error or "An unexpected error occurred. Please try again later." }}
        </p>
        
        <div class="space-x-4">
            <a href="{{ url_for('main.index') }}" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                Back to Search
            </a>
            <button onclick="window.history.back()" class="inline-block px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
